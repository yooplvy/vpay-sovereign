[profile.default]
src = "."
out = "out"
libs = ["lib"]
test = "test"
script = "deploy"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
skip = ["lib/openzeppelin-contracts/fv/**"]

# Polygon Mainnet for verification (Etherscan v2 unified API)
# NOTE: Since mid-2024 Etherscan unified keys across all EVM chains.
# A single key from etherscan.io/apis (or polygonscan.com — same key) works here.
# The v2 endpoint is required for unified keys; the old v1 endpoint returns "Invalid API Key".
[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}", chain = 137, url = "https://api.etherscan.io/v2/api" }

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
amoy = "${AMOY_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
